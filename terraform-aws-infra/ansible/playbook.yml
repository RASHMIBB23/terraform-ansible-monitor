---
- name: Configure web server with Docker, Nginx, and monitoring
  hosts: webserver
  become: true
  tasks:
    - name: Update all packages
      yum:
        name: '*'
        state: latest

    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Pull and run Nginx container
      docker_container:
        name: nginx_web
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "80:80"

    - name: Run node_exporter for monitoring
      docker_container:
        name: node_exporter
        image: prom/node-exporter:latest
        state: started
        restart_policy: always
        network_mode: host

    - name: Create Prometheus config directory
      file:
        path: /etc/prometheus
        state: directory

    - name: Copy Prometheus scrape config
      copy:
        src: files/prometheus.yml
        dest: /etc/prometheus/prometheus.yml

    - name: Run Prometheus
      docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: always
        published_ports:
          - "9090:9090"
        volumes:
          - /etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        network_mode: host

    - name: Run Grafana
      docker_container:
        name: grafana
        image: grafana/grafana:latest
        state: started
        published_ports:
          - "3000:3000"
